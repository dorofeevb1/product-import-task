name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build backend test image
        run: docker build -f backend/Dockerfile --target test -t product-backend-test ./backend
      - name: PHPStan
        run: docker run --rm -e DB_DRIVER=pdo_sqlite -e DB_PATH=:memory: product-backend-test vendor/bin/phpstan analyse --memory-limit=512M
      - name: PHPUnit
        run: docker run --rm -e DB_DRIVER=pdo_sqlite -e DB_PATH=:memory: product-backend-test vendor/bin/phpunit --testdox

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - run: cd frontend && npm ci
      - run: cd frontend && npm test -- --watch=false --no-progress
      - run: cd frontend && npm run build
