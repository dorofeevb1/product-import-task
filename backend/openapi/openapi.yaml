openapi: 3.0.3
info:
  title: Product Import API
  version: 1.0.0
servers:
  - url: / 
tags:
  - name: Health
  - name: Auth
  - name: Import
  - name: Products
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login with email/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  format: email
                  description: User email (legacy field name is username)
                password:
                  type: string
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "400":
          $ref: '#/components/responses/BadRequest'
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        "400":
          $ref: '#/components/responses/BadRequest'
        "409":
          $ref: '#/components/responses/Conflict'
  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate access and refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Token pair rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenRefresh'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "400":
          $ref: '#/components/responses/BadRequest'
  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke refresh token
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Session revoked
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
                    example: true
  /api/import:
    post:
      tags: [Import]
      summary: Upload xlsx and enqueue import
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportAccepted'
        "400":
          $ref: '#/components/responses/BadRequest'
        "429":
          $ref: '#/components/responses/TooManyRequests'
        "500":
          $ref: '#/components/responses/InternalServerError'
  /api/import/{taskId}:
    get:
      tags: [Import]
      summary: Get import status
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportTaskStatus'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'
  /api/products:
    get:
      tags: [Products]
      summary: List products with pagination and filters
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: name
          schema:
            type: string
        - in: query
          name: priceMin
          schema:
            type: number
        - in: query
          name: priceMax
          schema:
            type: number
      responses:
        "200":
          description: Product page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
        "500":
          $ref: '#/components/responses/InternalServerError'
  /api/products/{id}:
    get:
      tags: [Products]
      summary: Product details
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product card
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetails'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'

components:
  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      required: [code, message, details]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string
    ImportAccepted:
      type: object
      required: [taskId, status]
      properties:
        taskId:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued]
    ImportTaskStatus:
      type: object
      required: [id, status, processedRows, failedRows, errors]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, processing, completed, failed]
        processedRows:
          type: integer
        failedRows:
          type: integer
        errors:
          type: array
          items:
            type: string
    Product:
      type: object
      required: [id, externalCode, name, description, price, discount]
      properties:
        id:
          type: integer
        externalCode:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        discount:
          type: number
    ProductAttribute:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
    ProductImage:
      type: object
      properties:
        url:
          type: string
          format: uri
        path:
          type: string
    ProductDetails:
      allOf:
        - $ref: '#/components/schemas/Product'
        - type: object
          properties:
            attributes:
              type: array
              items:
                $ref: '#/components/schemas/ProductAttribute'
            images:
              type: array
              items:
                $ref: '#/components/schemas/ProductImage'
    ProductListResponse:
      type: object
      required: [items, page, limit, total, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
    AuthUser:
      type: object
      properties:
        username:
          type: string
        name:
          type: string
    AuthSession:
      type: object
      required: [token, tokenType, expiresIn, refreshToken, user]
      properties:
        token:
          type: string
        tokenType:
          type: string
        expiresIn:
          type: integer
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/AuthUser'
    AuthTokenRefresh:
      type: object
      required: [token, tokenType, expiresIn, refreshToken]
      properties:
        token:
          type: string
        tokenType:
          type: string
        expiresIn:
          type: integer
        refreshToken:
          type: string
